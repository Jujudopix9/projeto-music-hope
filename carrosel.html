    <style>
        body {
            background-color: #562717;
        }

        .disco {
            background-color: #C21717;

        }

        .contemporary {
            background-color: #FEA712;
            color: black;
            border-radius: 15px;
        }

        /* NAVBAR CUSTOM */
        .navbar {
            background-color: #3b2a1a !important;
        }

        .navbar .nav-link,
        .navbar .navbar-brand {
            color: #FDDCA9 !important;
        }

        .navbar .nav-link:hover {
            color: #FEA712 !important;
        }

        .btn-outline-light {
            color: #FDDCA9;
            border-color: #FDDCA9;
        }

        .btn-outline-light:hover {
            background-color: #FEA712;
            color: black;
            border-color: #FEA712;
        }

        /* AJUSTE DO CARROSSEL */
        #carouselExample {
            max-width: 800px;
            margin: auto;
        }

        .carousel img {
            height: 400px;
            object-fit: cover;
            border-radius: 15px;
        }

    </style>

</head>
