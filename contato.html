<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Music Hope</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        body { background-color: #562717; color: white; }
        .navbar { background-color: #3b2a1a !important; }
        .navbar .nav-link, .navbar .navbar-brand { color: #FDDCA9 !important; }
        .disco { background-color: #C21717; color: white; border-radius: 15px; }
        
       
        .form-control:focus {
            border-color: #FEA712;
            box-shadow: 0 0 0 0.25rem rgba(254, 167, 18, 0.25);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">Music Hope</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="carrosel.html">Galeria</a></li>
        <li class="nav-item"><a class="nav-link active" href="contato.html">Contato</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="disco p-5 shadow">
                <h2 class="text-center mb-4"><i class="bi bi-envelope-at"></i> Mande um Alô!</h2>
                
                <form class="row g-3 needs-validation" novalidate>
                    <div class="col-md-12">
                        <label class="form-label">Nome Completo</label>
                        <input type="text" class="form-control" placeholder="Seu nome aqui" required>
                        <div class="invalid-feedback">Por favor, digite seu nome.</div>
                    </div>

                    <div class="col-md-12">
                        <label class="form-label">E-mail</label>
                        <div class="input-group has-validation">
                            <span class="input-group-text bg-dark text-white border-0">@</span>
                            <input type="email" class="form-control" placeholder="email@exemplo.com" required>
                            <div class="invalid-feedback">Insira um e-mail válido.</div>
                        </div>
                    </div>

                    <div class="col-md-12">
                        <label class="form-label">Assunto</label>
                        <select class="form-select" required>
                            <option selected disabled value="">Escolha uma opção...</option>
                            <option>Sugestão de Playlist</option>
                            <option>Dúvida sobre Vinis</option>
                            <option>Elogios</option>
                        </select>
                        <div class="invalid-feedback">Selecione um assunto.</div>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Sua Mensagem</label>
                        <textarea class="form-control" rows="4" required></textarea>
                    </div>

                   <div class="col-12 text-center">
    <button class="btn btn-outline-light btn-lg px-5 mt-3" type="button" data-bs-toggle="modal" data-bs-target="#modalSucesso">
        Enviar Mensagem
    </button>
</div>
                </form>
            </div>
        </div>
    </div>
</div>

<footer class="text-center mt-5 mb-3 text-white-50">
    <p>&copy; 2026 Music Hope - Júlia & Nycollas</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

(() => {
  'use strict'
  const forms = document.querySelectorAll('.needs-validation')
  Array.from(forms).forEach(form => {
    form.addEventListener('submit', event => {
      if (!form.checkValidity()) {
        event.preventDefault()
        event.stopPropagation()
      }
      form.classList.add('was-validated')
    }, false)
  })
})()
</script>

<div class="modal fade" id="modalSucesso" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-dark text-white border-warning">
      <div class="modal-header border-secondary">
        <h5 class="modal-title">Mensagem Enviada!</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body text-center">
        <i class="bi bi-check-circle-fill text-success" style="font-size: 3rem;"></i>
        <p class="mt-3">Obrigado por entrar em contato com o <strong>Music Hope</strong>. Responderemos em breve!</p>
      </div>
      <div class="modal-footer border-secondary">
        <button type="button" class="btn btn-warning" data-bs-dismiss="modal">Entendido</button>
      </div>
    </div>
  </div>
</div>

</body>
</html>
